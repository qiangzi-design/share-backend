name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Build and test backend
      run: |
        cd backend
        mvn clean test
    
    - name: Build frontend
      run: |
        cd frontend
        npm ci
        npm run build
    
    - name: Upload frontend build
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: frontend/dist
    
    - name: Upload backend jar
      uses: actions/upload-artifact@v4
      with:
        name: backend-jar
        path: backend/target/*.jar

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: frontend-build
        path: frontend/dist
    
    - name: Download backend jar
      uses: actions/download-artifact@v4
      with:
        name: backend-jar
        path: backend/target
    
    - name: Deploy to production
      env:
        DEPLOY_SERVER: ${{ secrets.DEPLOY_SERVER }}
        DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      run: |
        echo "Deploying to production server..."
        # 这里可以添加SSH部署命令
        # 例如使用rsync或scp将构建产物部署到服务器
        # ssh -i $DEPLOY_KEY $DEPLOY_USER@$DEPLOY_SERVER "mkdir -p $DEPLOY_PATH"
        # scp -i $DEPLOY_KEY -r frontend/dist/* $DEPLOY_USER@$DEPLOY_SERVER:$DEPLOY_PATH/frontend/
        # scp -i $DEPLOY_KEY backend/target/*.jar $DEPLOY_USER@$DEPLOY_SERVER:$DEPLOY_PATH/backend/
        echo "Deployment completed"